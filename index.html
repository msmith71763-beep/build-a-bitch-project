<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUILD-A-BITCH.COM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.164.1/three.min.js"></script>
    <style>
        body { margin: 0; background: #050507; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; display: flex; height: 100vh; touch-action: none; }
        #viewport { flex: 1; position: relative; background: radial-gradient(circle at center, #1a1a2e 0%, #050507 100%); }
        #sidebar { width: 350px; background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(20px); border-left: 1px solid #18181b; padding: 25px; overflow-y: auto; z-index: 100; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .header { position: absolute; top: 30px; left: 30px; pointer-events: none; z-index: 10; }
        .tag { font-size: 9px; font-weight: 900; color: #a855f7; letter-spacing: 0.5em; text-transform: uppercase; opacity: 0.8; margin-bottom: 4px; }
        .title { font-size: 24px; font-weight: 200; text-transform: uppercase; margin: 0; line-height: 1; letter-spacing: 0.1em; }
        .title b { font-weight: 800; color: #a855f7; }
        .cat-tabs { display: flex; gap: 8px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
        .cat-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 12px 18px; background: #18181b; border: 1px solid #27272a; color: #71717a; border-radius: 12px; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: all 0.2s; flex-shrink: 0; }
        .tab-btn.active { background: #7c3aed; border-color: #a855f7; color: white; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        .control-group { margin-bottom: 30px; background: #111113; padding: 15px; border-radius: 16px; border: 1px solid #18181b; }
        .label { display: flex; justify-content: space-between; font-size: 10px; font-weight: 900; margin-bottom: 12px; color: #a1a1aa; letter-spacing: 0.1em; }
        .label span:last-child { color: #a855f7; }
        input[type="range"] { width: 100%; height: 4px; background: #27272a; border-radius: 2px; appearance: none; outline: none; margin: 10px 0; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: #a855f7; border-radius: 50%; cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { padding: 16px; background: #18181b; border: 1px solid #27272a; color: #a1a1aa; font-size: 10px; font-weight: 800; text-transform: uppercase; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .opt-btn.active { background: #7c3aed; border-color: #a855f7; color: white; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 45%; border-left: none; border-top: 1px solid #18181b; box-sizing: border-box; }
            #viewport { height: 55%; }
        }
    </style>
</head>
<body>
    <div id="viewport">
        <div class="header">
            <div class="tag">Final Build 21.0 - Hyper-Stable</div>
            <div class="title">BUILD-A-<b>BITCH</b></div>
        </div>
    </div>
    <div id="sidebar">
        <div class="cat-tabs" id="tabs"></div>
        <div id="controls"></div>
    </div>

    <script>
        const state = {
            body: { height: 50, weight: 85, muscle: 50 },
            chest: { size: 10, sag: 20 },
            anatomy: { type: 2, hair: 1 },
            hair: { color: 'red' },
            eyes: { color: 'green' },
            ethnicity: { preset: 'caucasian' }
        };

        const config = [
            { id: 'body', label: 'Proportions', fields: ['height', 'weight', 'muscle'] },
            { id: 'chest', label: 'Breasts', fields: ['size', 'sag'] },
            { id: 'anatomy', label: 'Anatomy', options: ['Type 1', 'Type 2', 'Type 3', 'Type 4', 'Type 5', 'Type 6'] },
            { id: 'hair', label: 'Hair', options: ['black', 'blonde', 'red', 'brown'] },
            { id: 'eyes', label: 'Eyes', options: ['brown', 'blue', 'green', 'hazel'] },
            { id: 'ethnicity', label: 'Skin Tone', options: ['caucasian', 'african', 'east_asian', 'south_asian', 'latin'] }
        ];

        const SKIN_PRESETS = { caucasian: "#f5d0c5", african: "#3d2b1f", east_asian: "#f3e0b5", south_asian: "#a67b5b", latin: "#c68642" };
        const HAIR_COLORS = { black: "#090909", blonde: "#e6c073", red: "#9a3324", brown: "#4b3221" };
        const EYE_COLORS = { brown: "#5c3317", blue: "#4a90d9", green: "#2d5a27", hazel: "#8b7355" };

        let activeCat = 'body';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        
        function updateSize() {
            const w = window.innerWidth > 768 ? window.innerWidth - 350 : window.innerWidth;
            const h = window.innerWidth > 768 ? window.innerHeight : window.innerHeight * 0.55;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }

        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('viewport').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        const spotLight = new THREE.SpotLight(0xffffff, 15);
        spotLight.position.set(5, 10, 7);
        scene.add(spotLight);

        const skinMat = new THREE.MeshPhysicalMaterial({ roughness: 0.3, clearcoat: 0.2, sheen: 0.8, sheenColor: 0xffdbd1 });
        const hairMat = new THREE.MeshStandardMaterial({ roughness: 0.8 });

        const group = new THREE.Group();
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.26, 64, 64), skinMat);
        head.position.y = 1.55;
        
        const hair = new THREE.Mesh(new THREE.CapsuleGeometry(0.29, 0.45, 16, 64), hairMat);
        hair.position.set(0, 1.7, -0.05);
        
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 0.8, 20, 64), skinMat);
        torso.position.y = 0.6;
        
        const boobL = new THREE.Mesh(new THREE.SphereGeometry(0.12, 64, 64), skinMat);
        const boobR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 64, 64), skinMat);
        
        const legL = new THREE.Mesh(new THREE.CapsuleGeometry(0.12, 0.75, 16, 32), skinMat);
        const legR = new THREE.Mesh(new THREE.CapsuleGeometry(0.12, 0.75, 16, 32), skinMat);
        legL.position.set(-0.16, -0.55, 0);
        legR.position.set(0.16, -0.55, 0);

        group.add(head, hair, torso, boobL, boobR, legL, legR);
        scene.add(group);
        group.position.y = -0.3;
        camera.position.set(0, 1.4, 4.5);
        camera.lookAt(0, 0.9, 0);

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.006;
            
            const h = 0.85 + (state.body.height / 100) * 0.3;
            const w = 0.8 + (state.body.weight / 100) * 0.7;
            group.scale.set(h, h, h);
            torso.scale.set(w, 1, 0.95);
            
            const bSize = 0.12 + (state.chest.size / 15) * 0.18;
            boobL.geometry.dispose();
            boobL.geometry = new THREE.SphereGeometry(bSize, 64, 64);
            boobR.geometry.dispose();
            boobR.geometry = new THREE.SphereGeometry(bSize, 64, 64);
            boobL.position.set(-0.16 * w, 0.8, 0.22 + (state.chest.size/15)*0.1);
            boobR.position.set(0.16 * w, 0.8, 0.22 + (state.chest.size/15)*0.1);

            legL.position.x = -0.16 * w;
            legR.position.x = 0.16 * w;

            skinMat.color.set(SKIN_PRESETS[state.ethnicity.preset]);
            hairMat.color.set(HAIR_COLORS[state.hair.color]);

            renderer.render(scene, camera);
        }
        
        updateSize();
        animate();

        function renderUI() {
            const tabs = document.getElementById('tabs');
            const ctrls = document.getElementById('controls');
            tabs.innerHTML = '';
            ctrls.innerHTML = '';

            config.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (activeCat === c.id ? ' active' : '');
                btn.innerText = c.label;
                btn.onclick = () => { activeCat = c.id; renderUI(); };
                tabs.appendChild(btn);
            });

            const current = config.find(c => c.id === activeCat);
            if (current.fields) {
                current.fields.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'control-group';
                    div.innerHTML = `<div class="label"><span>${f.toUpperCase()}</span><span>${state[activeCat][f]}%</span></div>
                                     <input type="range" min="0" max="100" value="${state[activeCat][f]}" oninput="state.${activeCat}.${f} = parseInt(this.value); this.parentElement.querySelector('.label span:last-child').innerText = this.value + '%';">`;
                    ctrls.appendChild(div);
                });
            } else {
                const div = document.createElement('div');
                div.className = 'grid';
                current.options.forEach(opt => {
                    const btn = document.createElement('button');
                    const val = activeCat === 'anatomy' ? 'Type ' + state.anatomy.type : (activeCat === 'ethnicity' ? state.ethnicity.preset : state[activeCat].color);
                    btn.className = 'opt-btn' + (val === opt ? ' active' : '');
                    btn.innerText = opt;
                    btn.onclick = () => {
                        if(activeCat === 'ethnicity') state.ethnicity.preset = opt;
                        else if(activeCat === 'anatomy') state.anatomy.type = parseInt(opt.split(' ')[1]);
                        else state[activeCat].color = opt;
                        renderUI();
                    };
                    div.appendChild(btn);
                });
                ctrls.appendChild(div);
            }
        }
        
        renderUI();
        window.addEventListener('resize', updateSize);
    </script>
</body>
</html>
