<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUILD-A-BITCH.COM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; height: 100vh; touch-action: none; }
        #viewport { flex: 1; position: relative; background: #050507; }
        #sidebar { width: 320px; background: #0a0a0c; border-left: 1px solid #1a1a1c; padding: 20px; overflow-y: auto; z-index: 100; }
        .header { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        .tag { font-size: 8px; font-weight: 900; color: #a855f7; letter-spacing: 0.5em; text-transform: uppercase; margin-bottom: 4px; }
        .title { font-size: 20px; font-weight: 200; text-transform: uppercase; margin: 0; }
        .title b { color: #a855f7; font-weight: 800; }
        .cat-tabs { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { padding: 10px 14px; background: #161618; border: 1px solid #222; color: #555; border-radius: 8px; cursor: pointer; font-size: 9px; font-weight: 800; text-transform: uppercase; flex-shrink: 0; }
        .tab-btn.active { background: #7c3aed; border-color: #a855f7; color: white; }
        .group { margin-bottom: 25px; background: #0d0d0f; padding: 15px; border-radius: 12px; border: 1px solid #161618; }
        .label { display: flex; justify-content: space-between; font-size: 9px; font-weight: 900; margin-bottom: 10px; color: #888; text-transform: uppercase; }
        .label span:last-child { color: #a855f7; }
        input[type="range"] { width: 100%; height: 4px; background: #222; border-radius: 2px; appearance: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: #a855f7; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .opt-btn { padding: 12px; background: #161618; border: 1px solid #222; color: #888; font-size: 9px; font-weight: 800; text-transform: uppercase; border-radius: 8px; cursor: pointer; }
        .opt-btn.active { background: #7c3aed; color: white; border-color: #a855f7; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.5s; }
        .spinner { width: 40px; height: 40px; border: 3px solid #7c3aed33; border-top-color: #7c3aed; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #viewport { height: 60%; }
            #sidebar { width: 100%; height: 40%; border-left: none; border-top: 1px solid #1a1a1c; }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="tag">Finalizing Stable Realism</div>
    </div>
    <div id="viewport">
        <div class="header">
            <div class="tag">Final Build 23.0</div>
            <div class="title">BUILD-A-<b>BITCH</b></div>
        </div>
    </div>
    <div id="sidebar">
        <div class="cat-tabs" id="tabs"></div>
        <div id="controls"></div>
    </div>
    <script>
        const state = {
            proportions: { height: 50, weight: 80 },
            hair: { color: 'red' },
            eyes: { color: 'green' },
            skin: { preset: 'caucasian' }
        };
        const config = [
            { id: 'proportions', label: 'Body', fields: ['height', 'weight'] },
            { id: 'skin', label: 'Skin', options: ['caucasian', 'african', 'east_asian', 'latin'] },
            { id: 'hair', label: 'Hair', options: ['black', 'blonde', 'red', 'brown'] },
            { id: 'eyes', label: 'Eyes', options: ['brown', 'blue', 'green', 'hazel'] }
        ];
        const PRESETS = {
            skin: { caucasian: "#f5d0c5", african: "#3d2b1f", east_asian: "#f3e0b5", latin: "#c68642" },
            hair: { black: "#090909", blonde: "#e6c073", red: "#9a3324", brown: "#4b3221" },
            eyes: { brown: "#5c3317", blue: "#4a90d9", green: "#2d5a27", hazel: "#8b7355" }
        };
        let activeCat = 'proportions'; let model;
        const scene = new THREE.Scene();
        const viewport = document.getElementById('viewport');
        const camera = new THREE.PerspectiveCamera(28, viewport.clientWidth/viewport.clientHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(viewport.clientWidth, viewport.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        viewport.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const skinMat = new THREE.MeshStandardMaterial({ roughness: 0.6 });
        const hairMat = new THREE.MeshStandardMaterial({ roughness: 0.8 });
        const loader = new THREE.GLTFLoader();
        loader.load('https://raw.githubusercontent.com/PacktPublishing/Hands-On-Game-Animation-Programming/master/AllChapters/Assets/Woman.gltf', (gltf) => {
            model = gltf.scene;
            model.traverse(child => {
                if (child.isMesh) {
                    child.material = child.name.toLowerCase().includes('hair') ? hairMat : skinMat;
                    if(child.geometry) child.geometry.computeVertexNormals();
                }
            });
            model.position.y = -1; scene.add(model);
            document.getElementById('loader').remove();
            animate();
        });
        camera.position.set(0, 0.5, 4.5);
        function animate() {
            requestAnimationFrame(animate);
            if (model) {
                model.rotation.y += 0.005;
                const h = 0.9 + (state.proportions.height / 100) * 0.2;
                const w = 0.85 + (state.proportions.weight / 100) * 0.75;
                model.scale.set(w, h, w);
            }
            skinMat.color.set(PRESETS.skin[state.skin.preset]);
            hairMat.color.set(PRESETS.hair[state.hair.color]);
            renderer.render(scene, camera);
        }
        function renderUI() {
            const tabs = document.getElementById('tabs'); const ctrls = document.getElementById('controls');
            tabs.innerHTML = ''; ctrls.innerHTML = '';
            config.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (activeCat === c.id ? ' active' : '');
                btn.innerText = c.label; btn.onclick = () => { activeCat = c.id; renderUI(); };
                tabs.appendChild(btn);
            });
            const current = config.find(c => c.id === activeCat);
            if (current.fields) {
                current.fields.forEach(f => {
                    const div = document.createElement('div'); div.className = 'group';
                    div.innerHTML = `<div class="label"><span>${f.toUpperCase()}</span><span>${state[activeCat][f]}%</span></div>
                                     <input type="range" min="0" max="100" value="${state[activeCat][f]}" oninput="state.${activeCat}.${f}=parseInt(this.value); renderUI();">`;
                    ctrls.appendChild(div);
                });
            } else {
                const div = document.createElement('div'); div.className = 'grid';
                current.options.forEach(opt => {
                    const btn = document.createElement('button');
                    const isSel = (activeCat === 'skin' ? state.skin.preset : state[activeCat].color) === opt;
                    btn.className = 'opt-btn' + (isSel ? ' active' : '');
                    btn.innerText = opt; btn.onclick = () => { if(activeCat === 'skin') state.skin.preset = opt; else state[activeCat].color = opt; renderUI(); };
                    div.appendChild(btn);
                });
                ctrls.appendChild(div);
            }
        }
        renderUI();
        window.onresize = () => {
            const w = window.innerWidth > 768 ? window.innerWidth - 320 : window.innerWidth;
            const h = window.innerWidth > 768 ? window.innerHeight : window.innerHeight * 0.6;
            renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
        };
    </script>
</body>
</html>
